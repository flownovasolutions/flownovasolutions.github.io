<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FlowNova Solutions</title>

  <style>
    /* GLOBAL */
    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #050814;
      color: white;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* NAVIGATION */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      background: rgba(5, 8, 20, 0.9);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 1000;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .logo {
      font-size: 1.6rem;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      transition: 0.3s ease;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      margin-left: 30px;
      font-size: 0.95rem;
      opacity: 0.85;
      transition: 0.2s;
    }

    .nav-links a:hover {
      opacity: 1;
      color: #ff4fd8;
    }

    /* HAMBURGER */
    .hamburger {
      display: none;
      flex-direction: column;
      cursor: pointer;
      gap: 5px;
    }

    .hamburger span {
      width: 26px;
      height: 3px;
      background: white;
      border-radius: 3px;
      transition: 0.3s;
    }

    .hamburger.active span {
      background: linear-gradient(90deg, #00d4ff, #ff4fd8);
      box-shadow: 0 0 10px rgba(255,0,255,0.5);
    }

    .hamburger.active span:nth-child(1) {
      transform: translateY(8px) rotate(45deg);
    }

    .hamburger.active span:nth-child(2) {
      opacity: 0;
    }

    .hamburger.active span:nth-child(3) {
      transform: translateY(-8px) rotate(-45deg);
    }

    @media (max-width: 768px) {
      .nav-links {
        position: absolute;
        top: 70px;
        right: 0;
        width: 100%;
        background:
          radial-gradient(circle at top, rgba(0,212,255,0.25), transparent 60%),
          radial-gradient(circle at bottom, rgba(255,0,255,0.20), transparent 70%),
          rgba(5, 8, 20, 0.95);
        backdrop-filter: blur(14px);
        border: 1px solid rgba(255,255,255,0.08);
        box-shadow:
          0 0 20px rgba(0,212,255,0.25),
          0 0 30px rgba(255,0,255,0.20);
        flex-direction: column;
        display: none;
        padding: 20px 0;
        animation: menuSlide 0.35s ease forwards;
      }

      @keyframes menuSlide {
        from { opacity: 0; transform: translateY(-20px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .nav-links a {
        position: relative;
        font-size: 1.25rem;
        padding: 10px 0;
        opacity: 0;
        animation: linkFade 0.5s ease forwards;
      }

      .nav-links a:nth-child(1) { animation-delay: 0.1s; }
      .nav-links a:nth-child(2) { animation-delay: 0.18s; }
      .nav-links a:nth-child(3) { animation-delay: 0.26s; }
      .nav-links a:nth-child(4) { animation-delay: 0.34s; }

      @keyframes linkFade {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .nav-links a::after {
        content: "";
        position: absolute;
        bottom: -4px;
        left: 50%;
        width: 0%;
        height: 2px;
        background: linear-gradient(90deg, #00d4ff, #ff4fd8, #9d4bff);
        transition: 0.3s ease;
        transform: translateX(-50%);
        border-radius: 4px;
      }

      .nav-links a:hover::after {
        width: 60%;
        box-shadow: 0 0 10px rgba(255,0,255,0.5);
      }

      .hamburger {
        display: flex;
      }

      nav {
        padding: 20px;
      }
    }

    /* HERO */
    header.hero {
      height: 100vh;
      background-image: url('hero-background.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
      z-index: 1;
      border: 4px solid transparent;
      border-radius: 12px;
      box-shadow:
        0 0 40px rgba(0,212,255,0.35),
        0 0 60px rgba(255,0,255,0.25),
        0 0 80px rgba(157,75,255,0.25);
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top, rgba(0,212,255,0.25), transparent 55%),
        radial-gradient(circle at bottom, rgba(255,0,255,0.15), transparent 60%),
        rgba(5, 8, 20, 0.8);
    }

    .hero-content {
      position: relative;
      z-index: 2;
      padding: 0 20px;
    }

    .hero-content h1 {
      font-size: 3.5rem;
      margin-bottom: 10px;
      animation: fadeIn 1s ease-out;
      background: linear-gradient(90deg, #00d4ff, #ff4fd8, #9d4bff);
      -webkit-background-clip: text;
      color: transparent;
    }

    .hero-content h2 {
      font-weight: 300;
      font-size: 1.5rem;
      margin-bottom: 30px;
      opacity: 0.9;
      animation: fadeIn 1.5s ease-out;
    }

    .cta-button {
      display: inline-block;
      padding: 14px 28px;
      background: linear-gradient(90deg, #00d4ff, #ff4fd8);
      color: #000;
      text-decoration: none;
      font-weight: bold;
      border-radius: 6px;
      transition: 0.2s;
      animation: fadeIn 2s ease-out;
      box-shadow: 0 0 20px rgba(255,0,255,0.35);
    }

    .cta-button:hover {
      background: linear-gradient(90deg, #ff4fd8, #9d4bff);
      transform: translateY(-2px);
      box-shadow: 0 0 30px rgba(255,0,255,0.55);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ANGLED DIVIDERS */
    .angled-divider {
      width: 100%;
      height: 80px;
      position: relative;
      z-index: 2;
    }

    .angled-bottom {
      background: linear-gradient(225deg, #0d1a33, #050814);
      clip-path: polygon(100% 0, 100% 100%, 0 100%);
    }

    .angled-top {
      background: linear-gradient(135deg, #050814, #0d1a33);
      clip-path: polygon(0 0, 100% 100%, 0 100%);
    }

  <!-- SECTION 3 -->
  <div class="section-wrapper">
    <section id="about" class="section fade-in">
      <h3>Why FlowNova</h3>
      <p>
        FlowNova is built on a simple belief:
        <strong>When systems are designed with clarity, people work better.</strong>
      </p>
      <ul>
        <li>4+ years of Power Platform expertise</li>
        <li>A structured, engineering‑minded approach</li>
        <li>Clean communication and collaborative delivery</li>
        <li>A modern, future‑focused brand you can trust</li>
        <li>A track record of making complex processes simple</li>
      </ul>
    </section>
  </div>

  <div class="angled-divider angled-top"></div>

  <!-- CTA SECTION -->
  <div class="gradient-section-wrapper">
    <section class="section fade-in" style="text-align:center;">
      <h3>Ready to streamline your workflows?</h3>
      <p>Let’s build something that transforms how your team works.</p>
      <a class="cta-button" href="mailto:shelby@flownovasolutions.com">Get Started</a>
    </section>
  </div>

  <!-- FLOATING CONTACT BUTTON -->
  <a href="mailto:shelby@flownovasolutions.com" class="floating-contact">Contact</a>

  <footer>
    © 2026 FlowNova Solutions — Built with clarity and intention.
  </footer>

  <script>
    function toggleMenu() {
      const menu = document.querySelector('.nav-links');
      const burger = document.querySelector('.hamburger');
      const isOpen = menu.style.display === 'flex';
      menu.style.display = isOpen ? 'none' : 'flex';
      burger.classList.toggle('active');
    }

    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) entry.target.classList.add('visible');
      });
    }, { threshold: 0.2 });

    document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
  </script>

</body>
</html>
