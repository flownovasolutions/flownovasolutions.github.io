<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Contact • FlowNova Solutions</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- GLOBAL CSS -->
  <link rel="stylesheet" href="/css/global.css">

  <style>
    /* CONTACT PAGE SPECIFIC */

    .page-shell {
      max-width: 1120px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }

    .contact-header {
      max-width: 640px;
      margin-bottom: 40px;
    }

    .contact-kicker {
      font-size: 0.8rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0.7;
      margin-bottom: 10px;
    }

    .contact-title {
      font-size: 2.4rem;
      line-height: 1.15;
      margin-bottom: 12px;
      background: var(--gradient-heading);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .contact-subtitle {
      opacity: 0.8;
      max-width: 520px;
    }

    /* FORM */

    .contact-section {
      max-width: 700px;
      margin-top: 32px;
    }

    .contact-section form label {
      display: block;
      margin-bottom: 22px;
      font-weight: 500;
      letter-spacing: 0.02em;
      font-size: 0.95rem;
    }

    .contact-section input,
    .contact-section textarea {
      width: 100%;
      padding: 14px 16px;
      margin-top: 6px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.05);
      color: white;
      font-size: 1rem;
      transition: border 0.25s ease, background 0.25s ease;
    }

    .contact-section input:focus,
    .contact-section textarea:focus {
      border-color: var(--blue);
      background: rgba(255, 255, 255, 0.1);
      outline: none;
    }

    .contact-section textarea {
      min-height: 140px;
      resize: vertical;
    }

    .project-type-group {
      margin-bottom: 28px;
    }

    .project-type-group > span {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      letter-spacing: 0.02em;
      font-size: 0.95rem;
    }

    .checkbox {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 6px 0;
      cursor: pointer;
      font-size: 0.95rem;
      opacity: 0.9;
    }

    .checkbox input {
      width: auto;
      margin: 0;
    }

    .hidden {
      display: none;
    }

    .contact-submit {
      margin-top: 10px;
      padding: 14px 24px;
      border-radius: 10px;
      background: var(--gradient-primary);
      border: none;
      color: white;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.25s ease;
    }

    .contact-submit:hover {
      opacity: 0.85;
    }

    .form-success {
      margin-top: 20px;
      color: #7CFFB2;
      font-size: 0.95rem;
    }

    .form-error {
      margin-top: 20px;
      color: #FF7C7C;
      font-size: 0.95rem;
    }
  </style>
</head>
