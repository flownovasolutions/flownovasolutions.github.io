---
title: Contact • FlowNova Solutions
layout: layout.njk
---
<main>

<!-- HERO -->
<section class="section text-center">
  <div class="section-eyebrow">Contact</div>
  <h2 class="hero-title">Tell us what you’re thinking.</h2>
  <p class="hero-subtext">
    Whether it’s a question, an idea, or just a hello —
    we’d love to hear from you.
  </p>
</section>

<div class="section-divider divider-gradient-lite divider-down
            divider-subtle divider-medium">
  <svg viewBox="0 0 100 100" preserveAspectRatio="none">
    <polygon points="0,0 100,100 0,100"></polygon>
  </svg>
</div>


<!-- BOOKING BANNER -->
<section class="section">
  <div class="booking-banner">
    <p>
      Looking to book a Discovery Call or Process Clarity Session?
      <a href="/book">Head to our booking page &rarr;</a>
    </p>
  </div>
</section>


<!-- CONTACT FORM -->
<section class="section">
  <div class="section-header text-center">
    <h2>Send us a message</h2>
  </div>

  <form class="contact-form"
        action="https://api.web3forms.com/submit" method="POST">
    <input type="hidden" name="access_key"
           value="37f41e82-34b4-43ea-a20d-5b90977f2964">
    <input type="hidden" name="subject"
           value="New Contact Inquiry — FlowNova Solutions">
    <input type="hidden" name="redirect"
           value="https://flownovasolutions.com/thank-you">
    <input type="hidden" name="from_name" value="FlowNova Website - Contact Form">
    
    
    <div class="form-group">
      <label for="contact-name">Name
        <span class="required">*</span></label>
      <input type="text" id="contact-name" name="name" required>
    </div>

    <div class="form-group">
      <label for="contact-email">Email
        <span class="required">*</span></label>
      <input type="email" id="contact-email" name="email" required>
    </div>

    <div class="form-group">
      <label>What brings you here?</label>
      <div class="inquiry-checkboxes">
        <label class="checkbox-label">
          <input type="checkbox" name="inquiry_type"
                 value="General Question">
          <span>General Question</span>
        </label>
        <label class="checkbox-label">
          <input type="checkbox" name="inquiry_type"
                 value="Partnership">
          <span>Partnership</span>
        </label>
        <label class="checkbox-label">
          <input type="checkbox" name="inquiry_type"
                 value="Existing Client Support">
          <span>Existing Client Support</span>
        </label>
        <label class="checkbox-label">
          <input type="checkbox" name="inquiry_type"
                 value="Press / Media">
          <span>Press / Media</span>
        </label>
        <label class="checkbox-label">
          <input type="checkbox" name="inquiry_type"
                 value="Something Else">
          <span>Something Else</span>
        </label>
      </div>
    </div>

    <div class="form-group">
      <label for="contact-message">Message
        <span class="required">*</span></label>
      <textarea id="contact-message" name="message" rows="5"
        placeholder="Tell us more..." required></textarea>
    </div>

    <button type="submit" class="cta-button">Send Message</button>
  </form>
</section>

</main>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    const form = document.getElementById("contactForm");
    const success = document.getElementById("formSuccess");
    const error = document.getElementById("formError");
    const otherCheckbox = document.getElementById("otherCheckbox");
    const otherText = document.getElementById("otherText");

    otherCheckbox.addEventListener("change", () => {
      otherText.classList.toggle("hidden", !otherCheckbox.checked);
    });

    function hasProjectTypeSelected() {
      const boxes = form.querySelectorAll('input[name="projectType"]');
      return Array.from(boxes).some((box) => box.checked);
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      success.classList.add("hidden");
      error.classList.add("hidden");

      if (!hasProjectTypeSelected()) {
        error.textContent = "Please select at least one project type.";
        error.classList.remove("hidden");
        return;
      } else {
        error.textContent = "Something went wrong. Please try again.";
      }

      const formData = new FormData(form);

      try {
        const response = await fetch(form.action, {
          method: "POST",
          body: formData,
          headers: { Accept: "application/json" },
        });

        if (response.ok) {
          form.reset();
          otherText.classList.add("hidden");
          success.classList.remove("hidden");
        } else {
          error.classList.remove("hidden");
        }
      } catch {
        error.classList.remove("hidden");
      }
    });
  });
</script>
